PACKAGE_NAME="rcraid"
# @PKGVER@ is substituted with the contents of the VERSION file by
# install-dkms.sh / install-livecd.sh when the tree is staged under
# /usr/src, so each driver release installs into its own dkms tree.
PACKAGE_VERSION="@PKGVER@"

BUILT_MODULE_NAME[0]="rcraid"
DEST_MODULE_LOCATION[0]="/updates/dkms"

MAKE[0]="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build modules"
CLEAN="make -C ${kernel_source_dir} M=${dkms_tree}/${PACKAGE_NAME}/${PACKAGE_VERSION}/build clean"

AUTOINSTALL="yes"
