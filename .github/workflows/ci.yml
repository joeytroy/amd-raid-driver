# SPDX-License-Identifier: GPL-2.0-only
#
# CI gates for the rcraid out-of-tree kernel module.
#
# Blocking gates (a failure fails the check / blocks merge):
#   * build      — compiles against multiple kernel versions
#   * warnings   — the build must be warning-clean
#   * spdx       — every C/H source carries an SPDX GPL-2.0-only tag
#   * whitespace — no trailing whitespace / no conflict markers in the diff
#
# Advisory gate (reported, does NOT block — see checkpatch job comment):
#   * checkpatch — kernel coding-style on the PR diff
#
name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Build the module against more than one kernel.  Using two runner images
  # gives two distinct, reliably-available kernel header sets (so we catch
  # in-kernel API drift that breaks out-of-tree modules) without pinning
  # fragile exact patch versions.  Add versions here as the support matrix
  # grows.
  # ---------------------------------------------------------------------------
  build:
    name: build (${{ matrix.name }})
    runs-on: ubuntu-24.04
    container: ${{ matrix.image }}
    strategy:
      fail-fast: false
      # The driver targets recent kernels (it uses linux/unaligned.h and
      # PCI_IRQ_INTX, which require >= 6.12), so the Ubuntu runner's own 6.8
      # headers can't build it.  Build inside rolling/recent distro containers
      # instead — each ships a different >= 6.12 kernel-headers tree, giving
      # real multi-version coverage.  Update/add images as the floor moves.
      matrix:
        include:
          # Debian 13 (Trixie) ships kernel 6.12 — the driver's MINIMUM
          # supported kernel and the install target most users will run.
          # Building here verifies the floor instead of inferring it.
          - name: debian-trixie-6.12
            image: debian:trixie
            deps: apt-get update && apt-get install -y --no-install-recommends build-essential linux-headers-amd64 git ca-certificates
          - name: arch
            image: archlinux:latest
            deps: pacman -Sy --noconfirm --needed base-devel linux-headers git
          - name: fedora
            image: fedora:latest
            deps: dnf -y install kernel-devel gcc make git findutils diffutils
    steps:
      # git must exist before actions/checkout runs.
      - name: Install toolchain + kernel headers
        run: ${{ matrix.deps }}

      - uses: actions/checkout@v4

      - name: Locate kernel build tree
        run: |
          # Arch:   /usr/lib/modules/<ver>/build
          # Debian: /lib/modules/<ver>/build  ->  /usr/src/linux-headers-<ver>-amd64
          # Fedora: /usr/src/kernels/<ver>
          KDIR=""
          for cand in \
            "$(ls -d /usr/lib/modules/*/build 2>/dev/null | sort -V | tail -1)" \
            "$(ls -d /lib/modules/*/build      2>/dev/null | sort -V | tail -1)" \
            "$(ls -d /usr/src/linux-headers-*-amd64 2>/dev/null | sort -V | tail -1)" \
            "$(ls -d /usr/src/kernels/*        2>/dev/null | sort -V | tail -1)"; do
            if [ -d "$cand" ]; then KDIR="$cand"; break; fi
          done
          test -d "$KDIR" || { echo "no kernel build tree found" >&2; exit 1; }
          echo "KDIR=$KDIR" >> "$GITHUB_ENV"
          echo "Building against: $KDIR"

      - name: Build (capture log)
        run: |
          set -o pipefail
          make KERNELDIR="$KDIR" 2>&1 | tee build.log
          test -f rcraid.ko || { echo "rcraid.ko not produced" >&2; exit 1; }

      - name: Fail on compiler warnings (driver sources)
        run: |
          # Judge only OUR sources (rc_*.c / rc_*.h), not the kernel headers:
          # the Makefile's -Wextra makes kernel inline headers emit a flood of
          # -Wunused-parameter we don't control.  Also ignore -Wunused-parameter
          # in our own files — the kernel disables it tree-wide because
          # callback/stub signatures legitimately carry unused params.  Any
          # OTHER warning in our code (unused-variable, uninitialized, format,
          # sign-compare, …) still fails the build.
          if grep -E ': warning:' build.log \
               | grep -E '(^|/)rc_[a-z0-9_]+\.[ch]:' \
               | grep -v '\[-Wunused-parameter\]'; then
            echo "::error::compiler warnings in driver sources — see above"
            exit 1
          fi
          echo "Driver sources are warning-clean (ignoring kernel-disabled -Wunused-parameter)."

  # ---------------------------------------------------------------------------
  # SPDX license tag — every driver source must declare GPL-2.0-only on line 1.
  # ---------------------------------------------------------------------------
  spdx:
    name: spdx-license
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check SPDX headers
        run: |
          rc=0
          for f in rc_*.c rc_*.h; do
            if ! head -1 "$f" | grep -q 'SPDX-License-Identifier: GPL-2.0-only'; then
              echo "::error file=$f::missing 'SPDX-License-Identifier: GPL-2.0-only' on line 1"
              rc=1
            fi
          done
          [ "$rc" -eq 0 ] && echo "All sources carry the SPDX GPL-2.0-only tag."
          exit $rc

  # ---------------------------------------------------------------------------
  # Whitespace / conflict-marker hygiene on the changed lines.
  # ---------------------------------------------------------------------------
  whitespace:
    name: whitespace
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: git diff --check
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          if [ -z "$BASE" ]; then BASE="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"; fi
          echo "Checking $BASE..HEAD for trailing whitespace + conflict markers"
          # Exclude generated reverse-engineering dumps and vendor binaries —
          # those are reference artifacts, not source we author.
          git diff --check "$BASE" HEAD -- \
            ':(exclude)docs/ghidra_output/**' \
            ':(exclude)drivers/windows/**'

  # ---------------------------------------------------------------------------
  # checkpatch — ADVISORY for now (continue-on-error).  Five source files
  # currently use 4-space indentation instead of kernel tabs, so a strict
  # blocking checkpatch would fail until the tree is normalized.  Once the
  # tree is converted to tab indentation, remove `continue-on-error: true`
  # below to make new style violations block merges.
  # ---------------------------------------------------------------------------
  checkpatch:
    name: checkpatch (advisory)
    runs-on: ubuntu-24.04
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch checkpatch.pl
        run: |
          base=https://raw.githubusercontent.com/torvalds/linux/master/scripts
          mkdir -p scripts-cp
          for f in checkpatch.pl const_structs.checkpatch spelling.txt; do
            curl -fsSL "$base/$f" -o "scripts-cp/$f" || true
          done
          chmod +x scripts-cp/checkpatch.pl
      - name: Run checkpatch on the diff
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          if [ -z "$BASE" ]; then BASE="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"; fi
          # Only lint the driver sources we author, not generated RE dumps.
          git diff "$BASE" HEAD -- 'rc_*.c' 'rc_*.h' 'Makefile' > pr.diff
          if [ ! -s pr.diff ]; then echo "No source changes to check."; exit 0; fi
          perl scripts-cp/checkpatch.pl --no-tree --no-signoff \
            --ignore FILE_PATH_CHANGES \
            pr.diff || true
